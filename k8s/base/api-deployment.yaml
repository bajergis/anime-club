apiVersion: apps/v1
kind: Deployment
metadata:
  name: anime-club-api
  labels:
    app: anime-club-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anime-club-api
  template:
    metadata:
      labels:
        app: anime-club-api
        tier: backend
    spec:
      containers:
        - name: api
          image: ghcr.io/youruser/anime-club-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DB_PATH
              value: "/data/anime-club.db"
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: anime-club-config
                  key: FRONTEND_URL
          volumeMounts:
            - name: db-storage
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: anime-club-db-pvc
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anime-club-frontend
  labels:
    app: anime-club-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anime-club-frontend
  template:
    metadata:
      labels:
        app: anime-club-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/youruser/anime-club-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: anime-club-config
                  key: API_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
server {
    listen $PORT;
    root /usr/share/nginx/html;
    index index.html;

    # proxy auth and api routes to backend
    location /auth/ {
        proxy_pass https://anime-rolling-backend.up.railway.app;
        proxy_set_header Host anime-rolling-backend.up.railway.app;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass https://anime-rolling-backend.up.railway.app;
        proxy_set_header Host anime-rolling-backend.up.railway.app;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}